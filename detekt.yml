build:
  maxIssues: 0

complexity:
  active: true
  CyclomaticComplexMethod:
    threshold: 15
  LongMethod:
    threshold: 60
    excludes: ['**/presentation/**']
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 8
  TooManyFunctions:
    thresholdInFiles: 20
    thresholdInClasses: 15
    thresholdInObjects: 15

naming:
  active: true
  FunctionNaming:
    # Compose @Composable functions are PascalCase; test backtick names are exempt
    functionPattern: '[a-z][a-zA-Z0-9]*'
    excludes: ['**/presentation/**', '**/test/**', '**/androidTest/**']
  TopLevelPropertyNaming:
    constantPattern: '[A-Z][_A-Z0-9]*'
    propertyPattern: '[a-z][a-zA-Z0-9]*'
    privatePropertyPattern: '(_)?[a-z][a-zA-Z0-9]*'

style:
  active: true
  MagicNumber:
    active: true
    ignoreNumbers: ['-1', '0', '1', '2', '10', '20', '100']
    ignoreAnnotated: ['Preview']
  ReturnCount:
    max: 3
  UnusedPrivateMember:
    active: true
    ignoreAnnotated: ['Preview']

coroutines:
  active: true
  GlobalCoroutineUsage:
    active: true
  RedundantSuspendModifier:
    active: true
  SuspendFunWithFlowReturnType:
    active: true

exceptions:
  active: true
  TooGenericExceptionCaught:
    active: true
    exceptionNames:
      - Exception
      - Throwable
  SwallowedException:
    active: true
